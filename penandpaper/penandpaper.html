<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pen & Paper Engine</title>
    <link rel="manifest" href="manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Pen & Paper">
    <link rel="apple-touch-icon" href="icon-192.png">
    <meta name="theme-color" content="#2196F3">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script>
        /* jshint esversion: 11 */
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('Service Worker registered:', reg.scope))
                    .catch(err => console.error('Service Worker registration failed:', err));
            });
        }

        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            // Prevent the mini-infobar from appearing on mobile
            e.preventDefault();
            // Stash the event so it can be triggered later.
            deferredPrompt = e;
            // Update UI notify the user they can install the PWA
            const installBtn = document.getElementById('btn-install');
            if (installBtn) {
                installBtn.style.display = 'inline-block';
            }
        });

        window.installPWA = function() {
            if (!deferredPrompt) return;
            // Show the install prompt
            deferredPrompt.prompt();
            // Wait for the user to respond to the prompt
            deferredPrompt.userChoice.then((choiceResult) => {
                if (choiceResult.outcome === 'accepted') {
                    console.log('User accepted the install prompt');
                } else {
                    console.log('User dismissed the install prompt');
                }
                deferredPrompt = null;
                const installBtn = document.getElementById('btn-install');
                if (installBtn) {
                    installBtn.style.display = 'none';
                }
            });
        };

        window.addEventListener('appinstalled', (evt) => {
            console.log('App was installed successfully');
            const installBtn = document.getElementById('btn-install');
            if (installBtn) {
                installBtn.style.display = 'none';
            }
        });
    </script>
    <style>
        :root {
            --primary: #2196F3;
            --bg: #121212;
            --surface: #1e1e1e;
            --on-surface: #ffffff;
            --on-surface-variant: #b0b0b0;
            --ui-height-top: 64px;
            --ui-height-bottom: 80px;
        }

        * {
            box-sizing: border-box;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: var(--on-surface);
            touch-action: none;
        }

        #app {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100%;
            position: relative;
        }

        /* Top Bar */
        #top-bar {
            height: var(--ui-height-top);
            background-color: var(--surface);
            display: flex;
            align-items: center;
            padding: 0 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.5);
            z-index: 100;
            gap: 8px;
        }

        .bar-section {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        #game-info {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #game-title {
            font-size: 1rem;
            font-weight: 700;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        #page-nav {
            font-size: 0.8rem;
            color: var(--on-surface-variant);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Arena / Workspace */
        #arena {
            flex-grow: 1;
            position: relative;
            background-color: #2a2a2a;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* The strict 1080x2256 workspace */
        #workspace {
            width: 1080px;
            height: 2256px;
            background-color: white;
            position: absolute;
            transform-origin: center;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
            pointer-events: none;
        }

        #bg-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        #draw-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: auto;
        }

        /* Bottom Bar */
        #bottom-bar {
            height: var(--ui-height-bottom);
            background-color: var(--surface);
            display: flex;
            align-items: center;
            justify-content: space-around;
            padding: 0 8px;
            box-shadow: 0 -2px 8px rgba(0,0,0,0.5);
            z-index: 100;
        }

        /* UI Elements */
        .icon-btn {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            border: none;
            background: transparent;
            color: var(--on-surface);
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            font-size: 24px;
            transition: background 0.2s;
        }

        .icon-btn:active {
            background: rgba(255,255,255,0.1);
        }

        .icon-btn.active {
            background: var(--primary);
            color: white;
        }

        .tool-group {
            display: flex;
            background: rgba(0,0,0,0.3);
            border-radius: 16px;
            padding: 4px;
            gap: 4px;
        }

        .color-dot {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.2);
        }

        .active .color-dot {
            border-color: white;
            box-shadow: 0 0 8px rgba(255,255,255,0.5);
        }

        /* Scoreboard & Dice */
        #scoreboard {
            position: absolute;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            padding: 8px 16px;
            border-radius: 24px;
            display: none;
            gap: 12px;
            z-index: 50;
            align-items: center;
        }

        .score-item {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: bold;
        }

        /* Modals */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        #modal {
            background: var(--surface);
            width: 85%;
            max-height: 80%;
            border-radius: 20px;
            padding: 24px;
            overflow-y: auto;
            position: relative;
        }

        #dice-container {
            display: flex;
            gap: 24px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .die {
            width: 100px;
            height: 100px;
            background: var(--primary);
            border-radius: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 3rem;
            font-weight: 800;
            color: white;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        #file-input { display: none; }
    </style>
</head>
<body>
    <div id="app">
        <header id="top-bar">
            <button class="icon-btn" onclick="document.getElementById('file-input').click()" title="Import Custom .pnp File">📂</button>
            <select id="library-select" onchange="onLibrarySelect(this.value)" style="background: var(--surface); color: var(--on-surface); border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; padding: 6px 12px; font-size: 0.9rem; outline: none; cursor: pointer; max-width: 150px; font-weight: bold; margin-left: 4px;">
                <option value="">Built-in Games...</option>
            </select>
            <button class="icon-btn" id="btn-fullscreen" onclick="toggleFullscreen()">⛶</button>
            <button class="icon-btn" id="btn-install" onclick="installPWA()" title="Install App" style="display: none;">📥</button>
            <div id="game-info">
                <div id="game-title">Pen & Paper Engine</div>
                <div id="page-nav" style="display: none;">
                    <button class="icon-btn" style="width: 32px; height: 32px; font-size: 16px;" onclick="prevPage()">◀</button>
                    <span id="page-indicator">1 / 1</span>
                    <button class="icon-btn" style="width: 32px; height: 32px; font-size: 16px;" onclick="nextPage()">▶</button>
                </div>
            </div>
            <button class="icon-btn" onclick="showRules()">📜</button>
        </header>

        <div id="scoreboard">
            <div class="score-item" style="color: #ff5252;">
                <button class="icon-btn" style="width: 32px; height: 32px; font-size: 20px;" onclick="adjustScore('red', -1)">-</button>
                <span>RED: <span id="score-red">0</span></span>
                <button class="icon-btn" style="width: 32px; height: 32px; font-size: 20px;" onclick="adjustScore('red', 1)">+</button>
            </div>
            <div style="width: 1px; height: 24px; background: rgba(255,255,255,0.2);"></div>
            <div class="score-item" style="color: #448aff;">
                <button class="icon-btn" style="width: 32px; height: 32px; font-size: 20px;" onclick="adjustScore('blue', -1)">-</button>
                <span>BLUE: <span id="score-blue">0</span></span>
                <button class="icon-btn" style="width: 32px; height: 32px; font-size: 20px;" onclick="adjustScore('blue', 1)">+</button>
            </div>
        </div>

        <main id="arena">
            <div id="workspace">
                <img id="bg-layer" src="" alt="">
                <canvas id="draw-layer" width="1080" height="2256"></canvas>
            </div>
        </main>

        <footer id="bottom-bar">
            <div class="tool-group">
                <button class="icon-btn tool-pen active" onclick="setTool('pen', '#000000')">
                    <div class="color-dot" style="background: #000000;"></div>
                </button>
                <button class="icon-btn tool-pen" onclick="setTool('pen', '#ff5252')">
                    <div class="color-dot" style="background: #ff5252;"></div>
                </button>
                <button class="icon-btn tool-pen" onclick="setTool('pen', '#448aff')">
                    <div class="color-dot" style="background: #448aff;"></div>
                </button>
            </div>

            <button class="icon-btn" id="btn-eraser" onclick="setTool('eraser')">🧽</button>
            <button class="icon-btn" id="btn-pan" onclick="setTool('pan')">🖐️</button>
            <button class="icon-btn" id="btn-fit" onclick="toggleFitMode()" title="Toggle Fit Mode">↕️</button>
            
            <div style="width: 2px; height: 40px; background: rgba(255,255,255,0.1);"></div>

            <button class="icon-btn" onclick="undo()">↩️</button>
            <button class="icon-btn" id="btn-dice" style="display: none;" onclick="rollDice()">🎲</button>
            <button class="icon-btn" onclick="clearPage()">🗑️</button>
        </footer>
    </div>

    <!-- Modals -->
    <div id="modal-rules" class="overlay" onclick="this.style.display='none'">
        <div id="modal" onclick="event.stopPropagation()">
            <h2 id="rules-title">Rules</h2>
            <div id="rules-content" style="white-space: pre-wrap; line-height: 1.6;">No game loaded.</div>
            <button class="icon-btn" style="float: right; width: auto; padding: 0 16px; font-size: 1rem;" onclick="document.getElementById('modal-rules').style.display='none'">CLOSE</button>
        </div>
    </div>

    <div id="modal-dice" class="overlay" onclick="this.style.display='none'">
        <div id="dice-container"></div>
    </div>

    <input type="file" id="file-input" accept=".pnp">

}; // BUNDLED_GAMES_PLACEHOLDER

        const workspace = document.getElementById('workspace');
        const canvas = document.getElementById('draw-layer');
        const ctx = canvas.getContext('2d');
        const bgLayer = document.getElementById('bg-layer');
        const fileInput = document.getElementById('file-input');
        
        // Game State
        let config = null;
        let pages = []; // [{ bgUrl, paths: [] }]
        let currentPageIdx = 0;
        let scores = { red: 0, blue: 0 };

        // Drawing State
        let currentTool = 'pen'; // 'pen', 'eraser', 'pan'
        let currentColor = '#000000';
        let currentPaths = []; // Temporary paths during draw
        let activePointers = new Map();
        let isDrawing = false;

        // View State (Zoom/Pan)
        let scale = 1;
        let offsetX = 0;
        let offsetY = 0;
        let workspaceFitScale = 1; // Initial scale to fit screen
        let fitMode = 'screen'; // 'screen', 'width', 'fill'

        // Initialize Workspace Fit
        function updateWorkspaceFit() {
            const arena = document.getElementById('arena');
            const arenaRect = arena.getBoundingClientRect();
            
            const scaleX = arenaRect.width / 1080;
            const scaleY = arenaRect.height / 2256;
            
            if (fitMode === 'width') {
                workspaceFitScale = scaleX;
            } else if (fitMode === 'fill') {
                workspaceFitScale = Math.max(scaleX, scaleY);
            } else { // 'screen'
                workspaceFitScale = Math.min(scaleX, scaleY);
            }
            
            applyView();
        }

        function applyView() {
            // Combined transform: Initial fit * user zoom * user pan
            workspace.style.transform = `scale(${workspaceFitScale * scale}) translate(${offsetX}px, ${offsetY}px)`;
        }

        function toggleFitMode() {
            if (fitMode === 'screen') {
                fitMode = 'width';
            } else if (fitMode === 'width') {
                fitMode = 'fill';
            } else {
                fitMode = 'screen';
            }
            updateFitModeUI();
            updateWorkspaceFit();
            resetView();
        }

        function updateFitModeUI() {
            const btn = document.getElementById('btn-fit');
            if (btn) {
                if (fitMode === 'screen') {
                    btn.innerText = '↕️';
                } else if (fitMode === 'width') {
                    btn.innerText = '↔️';
                } else {
                    btn.innerText = '🔍';
                }
            }
        }

        window.addEventListener('resize', updateWorkspaceFit);
        updateWorkspaceFit();

        // Coordinate Mapping
        function screenToWorkspace(clientX, clientY) {
            const workspaceRect = workspace.getBoundingClientRect();
            const x = (clientX - workspaceRect.left) / (workspaceFitScale * scale);
            const y = (clientY - workspaceRect.top) / (workspaceFitScale * scale);
            return { x, y };
        }

        // Tool Management
        function setTool(tool, color) {
            currentTool = tool;
            if (color) currentColor = color;
            
            document.querySelectorAll('.icon-btn').forEach(btn => btn.classList.remove('active'));
            if (tool === 'pen') {
                const btn = document.querySelector(`.tool-pen[onclick*="'${currentColor}'"]`);
                if (btn) btn.classList.add('active');
            } else if (tool === 'eraser') {
                document.getElementById('btn-eraser').classList.add('active');
            } else if (tool === 'pan') {
                document.getElementById('btn-pan').classList.add('active');
            }
        }

        // Pointer Events
        workspace.addEventListener('pointerdown', (e) => {
            workspace.setPointerCapture(e.pointerId);
            const pos = screenToWorkspace(e.clientX, e.clientY);
            activePointers.set(e.pointerId, { 
                lastX: pos.x, lastY: pos.y, 
                screenX: e.clientX, screenY: e.clientY,
                pressure: e.pressure || 0.5
            });

            if (currentTool !== 'pan' && activePointers.size === 1) {
                isDrawing = true;
                const path = {
                    tool: currentTool,
                    color: currentColor,
                    width: currentTool === 'eraser' ? 40 : 5,
                    points: [{ x: pos.x, y: pos.y, p: e.pressure || 0.5 }]
                };
                pages[currentPageIdx].paths.push(path);
            }
        });

        workspace.addEventListener('pointermove', (e) => {
            if (!activePointers.has(e.pointerId)) return;
            const pos = screenToWorkspace(e.clientX, e.clientY);
            const prev = activePointers.get(e.pointerId);

            if (activePointers.size === 1) {
                if (isDrawing) {
                    const path = pages[currentPageIdx].paths[pages[currentPageIdx].paths.length - 1];
                    path.points.push({ x: pos.x, y: pos.y, p: e.pressure || 0.5 });
                    redraw();
                } else if (currentTool === 'pan') {
                    offsetX += (e.clientX - prev.screenX) / (workspaceFitScale * scale);
                    offsetY += (e.clientY - prev.screenY) / (workspaceFitScale * scale);
                    applyView();
                }
            } else if (activePointers.size === 2) {
                const pointers = Array.from(activePointers.values());
                const other = Array.from(activePointers.entries()).find(([id]) => id !== e.pointerId)[1];
                
                // Old state
                const oldDist = Math.hypot(prev.screenX - other.screenX, prev.screenY - other.screenY);
                const oldMidX = (prev.screenX + other.screenX) / 2;
                const oldMidY = (prev.screenY + other.screenY) / 2;

                // New state
                const newDist = Math.hypot(e.clientX - other.screenX, e.clientY - other.screenY);
                const newMidX = (e.clientX + other.screenX) / 2;
                const newMidY = (e.clientY + other.screenY) / 2;

                // True Focal Zoom & Pan
                if (oldDist > 0 && newDist > 0) {
                    const zoomFactor = newDist / oldDist;
                    const newScale = Math.min(Math.max(scale * zoomFactor, 0.5), 10);
                    const scaleRatio = newScale / scale;
                    
                    // Keep the pinch center in the same spot by adjusting the offset
                    offsetX = newMidX - (newMidX - offsetX) * scaleRatio;
                    offsetY = newMidY - (newMidY - offsetY) * scaleRatio;
                    scale = newScale;
                } else {
                    offsetX += (newMidX - oldMidX) / (workspaceFitScale * scale);
                    offsetY += (newMidY - oldMidY) / (workspaceFitScale * scale);
                }
                applyView();
            }

            activePointers.set(e.pointerId, { 
                screenX: e.clientX, screenY: e.clientY,
                pressure: e.pressure || 0.5
            });
        });

        const handlePointerUp = (e) => {
            activePointers.delete(e.pointerId);
            if (activePointers.size === 0) isDrawing = false;
        };
        workspace.addEventListener('pointerup', handlePointerUp);
        workspace.addEventListener('pointercancel', handlePointerUp);

        // Render Engine
        function redraw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (!pages[currentPageIdx]) return;

            pages[currentPageIdx].paths.forEach(path => {
                if (path.points.length < 2) return;
                ctx.beginPath();
                ctx.moveTo(path.points[0].x, path.points[0].y);
                
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.lineWidth = path.width;
                ctx.globalCompositeOperation = path.tool === 'eraser' ? 'destination-out' : 'source-over';
                ctx.strokeStyle = path.color;

                for (let i = 1; i < path.points.length; i++) {
                    // Simple smoothing could go here, but let's start with raw lines
                    ctx.lineTo(path.points[i].x, path.points[i].y);
                }
                ctx.stroke();
            });
        }

        // PNP Loading
        fileInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            
            // Reset built-in dropdown
            const libSelect = document.getElementById('library-select');
            if (libSelect) libSelect.value = "";
            
            try {
                const zip = await JSZip.loadAsync(file);
                const configFile = zip.file("config.json");
                if (configFile) {
                    config = JSON.parse(await configFile.async("string"));
                    document.getElementById('game-title').innerText = config.game_name;
                    document.getElementById('btn-dice').style.display = config.dice?.enabled ? 'flex' : 'none';
                    document.getElementById('rules-content').innerText = config.rules;
                    resetScores();
                }

                const imageFiles = zip.file(/template(_\d+)?\.png/);
                imageFiles.sort((a, b) => a.name.localeCompare(b.name, undefined, {numeric: true}));
                
                // Clear old blob URLs to prevent leaks
                pages.forEach(p => {
                    if (p.bgUrl) URL.revokeObjectURL(p.bgUrl);
                });
                
                pages = [];
                for (const img of imageFiles) {
                    const blob = await img.async("blob");
                    pages.push({ bgUrl: URL.createObjectURL(blob), paths: [] });
                }
                
                currentPageIdx = 0;
                updatePageUI();
            } catch (err) { alert("Load failed: " + err.message); }
        });

        function updatePageUI() {
            if (pages.length === 0) return;
            bgLayer.src = pages[currentPageIdx].bgUrl;
            document.getElementById('page-nav').style.display = pages.length > 1 ? 'flex' : 'none';
            document.getElementById('page-indicator').innerText = `${currentPageIdx + 1} / ${pages.length}`;
            redraw();
            resetView();
        }

        function nextPage() { if (currentPageIdx < pages.length - 1) { currentPageIdx++; updatePageUI(); } }
        function prevPage() { if (currentPageIdx > 0) { currentPageIdx--; updatePageUI(); } }

        function resetView() {
            scale = 1; offsetX = 0; offsetY = 0;
            applyView();
        }

        function undo() {
            if (pages[currentPageIdx]?.paths.length > 0) {
                pages[currentPageIdx].paths.pop();
                redraw();
            }
        }

        function clearPage() {
            if (confirm("Clear all drawings on this page?")) {
                pages[currentPageIdx].paths = [];
                redraw();
            }
        }

        function updateScoreboardUI() {
            const scoreboard = document.getElementById('scoreboard');
            if (!config || !config.scoring || !config.scoring.enabled) {
                scoreboard.style.display = 'none';
                return;
            }
            
            const scoreType = config.scoring.type || 'match';
            if (scoreType === 'none') {
                scoreboard.style.display = 'none';
                return;
            }
            
            scoreboard.style.display = 'flex';
            
            if (scoreType === 'counter') {
                const label = config.scoring.label || 'SCORE';
                scoreboard.innerHTML = `
                    <div class="score-item" style="color: var(--on-surface);">
                        <button class="icon-btn" style="width: 32px; height: 32px; font-size: 20px;" onclick="adjustScore('counter', -1)">-</button>
                        <span>${label}: <span id="score-counter">${scores.counter || 0}</span></span>
                        <button class="icon-btn" style="width: 32px; height: 32px; font-size: 20px;" onclick="adjustScore('counter', 1)">+</button>
                    </div>
                `;
            } else { // 'match'
                const redLabel = config.scoring.labels?.[0] || 'RED';
                const blueLabel = config.scoring.labels?.[1] || 'BLUE';
                scoreboard.innerHTML = `
                    <div class="score-item" style="color: #ff5252;">
                        <button class="icon-btn" style="width: 32px; height: 32px; font-size: 20px;" onclick="adjustScore('red', -1)">-</button>
                        <span>${redLabel}: <span id="score-red">${scores.red || 0}</span></span>
                        <button class="icon-btn" style="width: 32px; height: 32px; font-size: 20px;" onclick="adjustScore('red', 1)">+</button>
                    </div>
                    <div style="width: 1px; height: 24px; background: rgba(255,255,255,0.2);"></div>
                    <div class="score-item" style="color: #448aff;">
                        <button class="icon-btn" style="width: 32px; height: 32px; font-size: 20px;" onclick="adjustScore('blue', -1)">-</button>
                        <span>${blueLabel}: <span id="score-blue">${scores.blue || 0}</span></span>
                        <button class="icon-btn" style="width: 32px; height: 32px; font-size: 20px;" onclick="adjustScore('blue', 1)">+</button>
                    </div>
                `;
            }
        }

        function adjustScore(p, delta) {
            scores[p] = Math.max(0, (scores[p] || 0) + delta);
            const el = document.getElementById(`score-${p}`);
            if (el) el.innerText = scores[p];
        }

        function resetScores() {
            scores = { red: 0, blue: 0, counter: 0 };
            updateScoreboardUI();
        }

        function showRules() { document.getElementById('modal-rules').style.display = 'flex'; }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    alert(`Error attempting to enable full-screen mode: ${err.message}`);
                });
            } else {
                document.exitFullscreen();
            }
        }

        function rollDice() {
            if (!config?.dice?.enabled) return;
            const container = document.getElementById('dice-container');
            container.innerHTML = '';
            for (let i = 0; i < config.dice.count; i++) {
                const val = Math.floor(Math.random() * config.dice.sides) + 1;
                const d = document.createElement('div');
                d.className = 'die';
                d.innerText = val;
                container.appendChild(d);
            }
            document.getElementById('modal-dice').style.display = 'flex';
        }

        async function loadPnpFromBase64(base64Data, gameName) {
            try {
                // Convert base64 to binary array
                const binaryString = atob(base64Data);
                const bytes = new Uint8Array(binaryString.length);
                for (let i = 0; i < binaryString.length; i++) {
                    bytes[i] = binaryString.charCodeAt(i);
                }
                
                const zip = await JSZip.loadAsync(bytes);
                const configFile = zip.file("config.json");
                if (configFile) {
                    config = JSON.parse(await configFile.async("string"));
                    document.getElementById('game-title').innerText = config.game_name;
                    document.getElementById('btn-dice').style.display = config.dice?.enabled ? 'flex' : 'none';
                    document.getElementById('rules-content').innerText = config.rules;
                    resetScores();
                }

                const imageFiles = zip.file(/template(_\d+)?\.png/);
                imageFiles.sort((a, b) => a.name.localeCompare(b.name, undefined, {numeric: true}));
                
                // Clear old blob URLs to prevent leaks
                pages.forEach(p => {
                    if (p.bgUrl) URL.revokeObjectURL(p.bgUrl);
                });
                
                pages = [];
                for (const img of imageFiles) {
                    const blob = await img.async("blob");
                    pages.push({ bgUrl: URL.createObjectURL(blob), paths: [] });
                }
                
                currentPageIdx = 0;
                updatePageUI();
            } catch (err) { alert("Load failed: " + err.message); }
        }

        function initLibrary() {
            const select = document.getElementById('library-select');
            if (!select) return;
            for (const gameName in BUILTIN_GAMES) {
                const opt = document.createElement('option');
                opt.value = gameName;
                opt.innerText = gameName;
                select.appendChild(opt);
            }
        }
        
        async function onLibrarySelect(gameName) {
            if (!gameName) return;
            const base64Data = BUILTIN_GAMES[gameName];
            if (base64Data) {
                await loadPnpFromBase64(base64Data, gameName);
            }
        }

        // Initialize Library on Startup
        initLibrary();

    </script>
</body>
</html>
