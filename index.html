<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Nova PWA Portal</title>
  
  <!-- SEO & Description -->
  <meta name="description" content="Sleek, self-hosted Progressive Web App hub to quickly launch and install your mobile projects.">
  
  <!-- Manifest & Favicons -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#8b5cf6">
  
  <!-- iOS Safari specific enhancements -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Nova Portal">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  
  <!-- External Fonts & Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- Local Stylesheet -->
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Ambient background gradients -->
  <div class="bg-gradients">
    <div class="gradient-blob blob-1"></div>
    <div class="gradient-blob blob-2"></div>
  </div>

  <div class="app-container">
    <!-- Offline status notification banner -->
    <div id="offline-indicator" class="offline-banner hidden" role="alert">
      <i class="fa-solid fa-cloud-slash"></i> Offline mode active. Caches will resolve loaded apps.
    </div>

    <!-- Header Area -->
    <header>
      <div class="header-top">
        <div class="brand">
          <div class="logo-wrapper">
            <img src="icons/icon.svg" alt="Nova logo">
          </div>
          <div class="brand-text">
            <h1>Nova PWA Portal</h1>
            <p>Self-Hosted App Launcher</p>
          </div>
        </div>
        <div class="action-buttons">
          <button id="btn-portal-install" class="btn-install hidden" title="Install Portal PWA">
            <i class="fa-solid fa-download"></i> Install Portal
          </button>
        </div>
      </div>
      <div class="search-controls">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input type="text" id="search-input" class="search-input" placeholder="Search applications..." aria-label="Search applications">
      </div>
    </header>

    <!-- Main Scrollable App Grid -->
    <main class="scroll-content">
      <div id="pwa-grid" class="pwa-grid">
        <!-- Dynamic app cards injected here by app.js -->
        <div style="grid-column: 1/-1; text-align: center; padding: 40px; color: var(--text-secondary);">
          <i class="fa-solid fa-circle-notch fa-spin" style="font-size: 2rem; color: var(--neon-cyan); margin-bottom: 16px;"></i>
          <p>Scanning registry...</p>
        </div>
      </div>
    </main>
  </div>

  <!-- Advanced Details Drawer -->
  <div id="details-drawer" class="drawer" role="dialog" aria-labelledby="drawer-app-title">
    <div class="drawer-header">
      <h2 id="drawer-app-title">App Name</h2>
      <button id="btn-close-drawer" class="btn-icon" aria-label="Close details panel">
        <i class="fa-solid fa-xmark"></i>
      </button>
    </div>
    <div class="drawer-content">
      <div class="info-item">
        <span class="info-label">Deployment Directory</span>
        <span id="info-folder" class="info-val">dir_name/</span>
      </div>
      <div class="info-item">
        <span class="info-label">Resolve URL</span>
        <span id="info-start-url" class="info-val">index.html</span>
      </div>
      <div class="info-item">
        <span class="info-label">Accent Theme Color</span>
        <span id="info-theme-color" class="info-val">#000000</span>
      </div>
      <div class="info-item">
        <span class="info-label">Categories</span>
        <span id="info-categories" class="info-val">utility</span>
      </div>
      <div class="info-item">
        <span class="info-label">Description</span>
        <span id="info-description" class="info-val">Detailed description will appear here.</span>
      </div>
      
      <div style="margin-top: auto; display: flex; flex-direction: column; gap: 12px;">
        <button id="btn-clear-cache" class="btn-action-block">
          <i class="fa-solid fa-trash-can"></i> Clear Application Cache
        </button>
      </div>
    </div>
  </div>

  <!-- Portal Logic Script -->
  <script src="app.js"></script>
</body>
</html>
