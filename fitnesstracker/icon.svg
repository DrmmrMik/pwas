<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Background -->
  <rect width="512" height="512" rx="128" fill="#090d16" />
  
  <!-- Outer Glow Ring -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="url(#cyan-rose-grad)" stroke-width="12" opacity="0.15" />
  
  <!-- Subtle Gradient Accent Circle -->
  <circle cx="256" cy="256" r="160" fill="none" stroke="url(#cyan-rose-grad)" stroke-dasharray="10 15" stroke-width="4" opacity="0.3" />

  <!-- Center Icon Group: Bolt with a sleek fitness/mind aura -->
  <g>
    <!-- Zap Bolt centered -->
    <path d="M290 80 L130 280 L230 280 L190 432 L382 232 L270 232 Z" fill="url(#cyan-rose-grad)" filter="url(#glow)" />
  </g>
  
  <!-- Definitions -->
  <defs>
    <!-- Gradients -->
    <linearGradient id="cyan-rose-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#f43f5e" />
    </linearGradient>
    
    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
</svg>
