<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bg-grad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#141a29" />
      <stop offset="100%" stop-color="#090d16" />
    </radialGradient>
    
    <!-- Neon Purple Glow -->
    <filter id="glow-purple" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    
    <!-- Neon Cyan Glow -->
    <filter id="glow-cyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    
    <!-- Theme Gradients -->
    <linearGradient id="purple-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d946ef" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>
    <linearGradient id="cyan-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>
  </defs>
  
  <!-- Outer Rounded Square Background -->
  <rect width="512" height="512" rx="100" fill="url(#bg-grad)" stroke="#1e293b" stroke-width="4"/>
  
  <!-- Inner Border Frame with Purple Glow -->
  <rect x="40" y="40" width="432" height="432" rx="80" fill="none" stroke="url(#purple-grad)" stroke-width="8" filter="url(#glow-purple)" opacity="0.8"/>
  
  <!-- Stylized App Grid representing the launcher -->
  <g transform="translate(106, 106)" filter="url(#glow-cyan)">
    <!-- Main Center Planet/Glow element -->
    <circle cx="150" cy="150" r="40" fill="none" stroke="url(#cyan-grad)" stroke-width="6"/>
    <circle cx="150" cy="150" r="15" fill="url(#cyan-grad)"/>
    
    <!-- Floating App Tiles / Hexagons / Diamonds -->
    <!-- Top-Left Diamond -->
    <path d="M 60 20 L 90 50 L 60 80 L 30 50 Z" fill="none" stroke="url(#purple-grad)" stroke-width="4"/>
    <circle cx="60" cy="50" r="6" fill="#d946ef"/>
    
    <!-- Top-Right Diamond -->
    <path d="M 240 20 L 270 50 L 240 80 L 210 50 Z" fill="none" stroke="url(#purple-grad)" stroke-width="4"/>
    <circle cx="240" cy="50" r="6" fill="#8b5cf6"/>
    
    <!-- Bottom-Left Diamond -->
    <path d="M 60 200 L 90 230 L 60 260 L 30 230 Z" fill="none" stroke="url(#cyan-grad)" stroke-width="4"/>
    <circle cx="60" cy="230" r="6" fill="#22d3ee"/>
    
    <!-- Bottom-Right Diamond -->
    <path d="M 240 200 L 270 230 L 240 260 L 210 230 Z" fill="none" stroke="url(#cyan-grad)" stroke-width="4"/>
    <circle cx="240" cy="230" r="6" fill="#06b6d4"/>
    
    <!-- Top Center Icon Connector Rings -->
    <path d="M 150 50 A 100 100 0 0 1 240 140" fill="none" stroke="#475569" stroke-width="2" stroke-dasharray="8,6"/>
    <path d="M 60 140 A 100 100 0 0 1 150 50" fill="none" stroke="#475569" stroke-width="2" stroke-dasharray="8,6"/>
    <path d="M 150 250 A 100 100 0 0 1 60 160" fill="none" stroke="#475569" stroke-width="2" stroke-dasharray="8,6"/>
    <path d="M 240 160 A 100 100 0 0 1 150 250" fill="none" stroke="#475569" stroke-width="2" stroke-dasharray="8,6"/>
  </g>
</svg>
